# Build the static site from readme.md and deploy it to GitHub Pages.
#
# One-time setup: the repo owner must enable Pages with source "GitHub Actions"
# in repo Settings -> Pages. After that, every change to readme.md (or the site
# itself) rebuilds site/data/tools.json and redeploys automatically — the
# readme stays the single source of truth.

name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - readme.md
      - site/**
      - scripts/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build tools.json from readme.md
        run: node scripts/parse-readme.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
